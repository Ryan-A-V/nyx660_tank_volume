# =============================================================================
# Tank Volume Measurement — Helios2 Wide Configuration
# =============================================================================
# Copy this file to config.yaml and adjust for your deployment.
#
# Two modes:
#   backend: mock_helios2   → test without hardware (start here)
#   backend: helios2        → real Helios2 Wide sensor via Arena SDK
# =============================================================================

server:
  host: "0.0.0.0"
  port: 8080
  api_token: "change-me"

storage:
  data_dir: "./data"
  calibration_file: "./data/empty_tank_calibration.npz"
  latest_measurement_file: "./data/latest_measurement.json"

camera:
  # Switch to "helios2" once the sensor is connected and Arena SDK is installed.
  backend: "mock_helios2"

  device_index: 0
  width: 640
  height: 480
  fps: 2                     # 2 Hz is plenty for tank level monitoring
  warmup_frames: 10

  # Mount height: distance from sensor lens to the tank floor (empty tank).
  # For a 4 ft tank with sensor ~1.3 m above the rim: 1.22 + 1.3 = 2.52 m
  mount_height_m: 2.5

  # depth_scale_m is not used by the Helios2 backend (it reads scale from
  # the camera nodemap), but kept for backward compat with NYX660 configs.
  depth_scale_m: 0.001

  # Camera intrinsics for the Helios2 Wide.
  # These are approximate values for the 108x78 deg FoV at 640x480.
  # Replace with the actual values from the camera's calibration data
  # (available via Scan3dFocalLength or Arena SDK intrinsics nodes).
  intrinsics:
    fx: 240.0
    fy: 240.0
    cx: 320.0
    cy: 240.0

  # Crop to the tank interior to ignore walls, rim, and anything outside
  # the tank footprint. Set enabled: true and adjust the pixel bounds
  # after viewing a depth frame from the mounted sensor.
  crop:
    enabled: false
    x_min: 40
    x_max: 600
    y_min: 30
    y_max: 450

  # Helios2 Wide specific settings
  helios2:
    # Operating mode — pick based on your sensor-to-floor distance:
    #   "1250mm" — up to 1.25 m (very close mounting)
    #   "3000mm" — up to 3.0 m  (typical for shallow tanks)
    #   "5000mm" — up to 5.0 m  (recommended for 20'x10'x4' tank)
    #   "6000mm" — up to 6.0 m
    #   "8300mm" — up to 8.3 m  (deepest tanks)
    operating_mode: "5000mm"

    # Exposure — controls depth quality vs frame rate:
    #   "short"  — 187.5 µs, 30 FPS, lower quality
    #   "medium" — 750 µs, 30 FPS, good balance
    #   "long"   — 3000 µs, ~10 FPS, best quality (recommended)
    exposure: "long"

    # On-camera spatial filter (bilateral smoothing).
    # Reduces per-pixel noise while preserving edges. Recommended on.
    spatial_filter: true

    # On-camera confidence threshold.
    # Rejects low-quality depth pixels. Recommended on.
    confidence_threshold: true

    # Image accumulation (on-camera frame averaging).
    # Higher values = smoother but slower. 1-4 recommended.
    image_accumulation: 1

    # Conversion gain. "Low" for better signal on diffuse surfaces.
    conversion_gain: "Low"

    # Tank depth in metres (used by mock only for scene generation).
    # 4 feet = 1.22 m
    tank_depth_m: 1.22

measurement:
  min_valid_depth_m: 0.3       # Helios2 Wide minimum range
  max_valid_depth_m: 8.3       # Helios2 Wide maximum range
  smooth_frames: 5
  baseline_frames: 30
  fill_threshold_m: 0.015      # ignore fill below 15 mm (sensor noise floor)
  max_height_step_m: 1.5       # max fill height (slightly above tank depth)
  outlier_clip_percentile_low: 2.0
  outlier_clip_percentile_high: 98.0
  occupancy_mask_min_height_m: 0.01

  # Set this to your tank's usable volume for liters + fill ratio.
  # 20' x 10' x 4' ≈ 22,653 liters. Set to null for geometry-only mode.
  known_volume_liters: 22653
